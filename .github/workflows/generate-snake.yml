name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#BD93F9
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#BD93F9&color_dots=#1E1E2E,#3B2A5E,#6247AA,#8B5FD9,#BD93F9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: Update snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
